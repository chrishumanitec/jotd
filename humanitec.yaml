id: jotd
workload:
  externals:
    dns:
      type: dns
  profile: humanitec/default-module
  spec:
    containers:
      main:
        variables:
          MESSAGE: "Hello World"
          PORT: "8080"
    ingress:
      rules:
        externals.dns:
          http:
            '*':
              port: 8080
              type: default
